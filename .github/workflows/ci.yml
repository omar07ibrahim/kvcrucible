name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, test, build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Show pinned toolchain
        run: rustup show active-toolchain

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint all targets
        run: >-
          cargo clippy --target x86_64-unknown-linux-musl
          --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: >-
          cargo test --target x86_64-unknown-linux-musl
          --all-targets --all-features --locked

      - name: Build static release CLI
        run: cargo build --release --target x86_64-unknown-linux-musl --locked

      - name: Verify static linkage
        run: |
          binary=./target/x86_64-unknown-linux-musl/release/kvcrucible
          headers="$RUNNER_TEMP/kvcrucible-elf-headers"
          readelf --program-headers --wide "$binary" > "$headers"
          if grep -Eq '^[[:space:]]+INTERP[[:space:]]' "$headers"; then
            echo 'release binary unexpectedly has a dynamic interpreter' >&2
            exit 1
          fi

      - name: Exercise machine-readable contract
        run: ./target/x86_64-unknown-linux-musl/release/kvcrucible contract --format json
